  <style>
  /* ───────────────────────────────────────────────────────────────
     DESIGN TOKENS
     ─────────────────────────────────────────────────────────────── */
  :root {
    /* Theme colors — updated per-activity by JS */
    --bg: #f3ede3;
    --fg: #1a1a1a;
    --accent: #d94f2b;

    /* Activity typography — updated per-activity by JS */
    --activity-font:     'DM Mono', monospace;
    --activity-size:     2rem;
    --activity-weight:   400;
    --activity-tracking: 0;

    /* Timing */
    --theme-transition:    700ms cubic-bezier(.2, .8, .2, 1);
    --reveal-duration:     600ms;
    --reveal-easing:       cubic-bezier(.2, .8, .2, 1);

    /* Layout */
    --content-max-width:   1100px;
    --page-padding:        2.5rem 1.5rem;
  }

  /* ───────────────────────────────────────────────────────────────
     RESET & BASE
     ─────────────────────────────────────────────────────────────── */
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: 'DM Mono', ui-monospace, 'Cascadia Mono', Menlo, Consolas, monospace;
    background-color: var(--bg);
    color: var(--fg);
    transition:
      background-color var(--theme-transition),
      color var(--theme-transition);
  }

  /* ───────────────────────────────────────────────────────────────
     LAYOUT
     ─────────────────────────────────────────────────────────────── */
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: var(--page-padding);
    position: relative;
  }

  .page-header,
  .page-footer {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    opacity: 0.7;
    z-index: 2;
  }

  .page-main {
    flex: 1;
    width: 100%;
    max-width: var(--content-max-width);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    z-index: 2;
    position: relative;
  }

  /* ───────────────────────────────────────────────────────────────
     ACTIVITY  (the main centered content)
     ─────────────────────────────────────────────────────────────── */
  .activity-counter {
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    opacity: 0.6;
    margin-bottom: 2rem;
  }

  .activity {
    line-height: 0.95;
    word-break: break-word;
    hyphens: auto;
    padding: 0 0.5rem;
    max-width: 100%;
  }

  .activity-text {
    /* Picks up the CSS vars JS sets per activity */
    font-family:    var(--activity-font);
    font-size:      var(--activity-size);
    font-weight:    var(--activity-weight);
    letter-spacing: var(--activity-tracking);
    line-height: 1.05;
  }

  .activity-subtitle {
    font-family: 'DM Mono', monospace;
    font-size: clamp(0.85rem, 1.6vw, 1.1rem);
    letter-spacing: 0.05em;
    line-height: 1.5;
    opacity: 0.85;
    max-width: 600px;
    margin: 1.5rem auto 0;
  }

  .activity-subtitle[hidden] {
    display: none;
  }

  /* ───────────────────────────────────────────────────────────────
     CONTROLS  (button + hint + secondary actions)
     ─────────────────────────────────────────────────────────────── */
  .controls {
    margin-top: 3rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.75rem;
  }

  .next-button {
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 500;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    background-color: var(--fg);
    color: var(--bg);
    border: none;
    border-radius: 999px;
    padding: 1.2rem 2.5rem;
    cursor: pointer;
    transition:
      transform 250ms ease,
      box-shadow 250ms ease,
      background-color var(--theme-transition),
      color var(--theme-transition);
  }

  .next-button:hover {
    transform: translateY(-2px) scale(1.03);
    box-shadow: 0 12px 30px -10px rgba(0, 0, 0, 0.4);
  }

  .next-button:active {
    transform: translateY(0) scale(0.98);
  }

  .next-button::after {
    content: ' →';
    display: inline-block;
    transition: transform 200ms ease;
  }

  .next-button:hover::after {
    transform: translateX(4px);
  }

  .next-button-hint {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    opacity: 0.5;
  }

  /* Secondary action row: Done + Help */
  .secondary-actions {
    display: flex;
    align-items: center;
    gap: 1.25rem;
    margin-top: 0.25rem;
  }

  .done-button {
    font-family: inherit;
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    background: transparent;
    color: var(--fg);
    border: 1.5px solid currentColor;
    border-radius: 999px;
    padding: 0.65rem 1.5rem;
    cursor: pointer;
    opacity: 0.75;
    transition:
      background-color 200ms ease,
      color 200ms ease,
      opacity 200ms ease,
      border-color var(--theme-transition);
  }

  .done-button:hover:not(:disabled) {
    opacity: 1;
    background: var(--fg);
    color: var(--bg);
  }

  .done-button:active:not(:disabled) {
    transform: scale(0.97);
  }

  .done-button.is-confirmed {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--bg);
    opacity: 1;
    cursor: default;
  }

  .done-button:disabled {
    cursor: default;
  }

  .help-link {
    font-family: inherit;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--fg);
    opacity: 0.45;
    padding: 0.25rem 0;
    transition: opacity 200ms ease;
  }

  .help-link:hover {
    opacity: 1;
  }

  .help-link[hidden] {
    display: none;
  }

  /* ───────────────────────────────────────────────────────────────
     FOOTER DONE COUNT
     ─────────────────────────────────────────────────────────────── */
  .done-count {
    font-family: inherit;
    font-size: inherit;
    font-weight: inherit;
    letter-spacing: inherit;
    text-transform: inherit;
    background: none;
    border: none;
    color: var(--fg);
    padding: 0;
    cursor: default;
    opacity: 0.7;
    transition:
      opacity 200ms ease,
      color var(--theme-transition);
  }

  .done-count.has-items {
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 3px;
  }

  .done-count.has-items:hover {
    opacity: 1;
  }

  /* ───────────────────────────────────────────────────────────────
     PANEL BACKDROP
     ─────────────────────────────────────────────────────────────── */
  .panel-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.35);
    backdrop-filter: blur(2px);
    z-index: 10;
    opacity: 0;
    pointer-events: none;
    transition: opacity 300ms ease;
  }

  .panel-backdrop.is-open {
    opacity: 1;
    pointer-events: all;
  }

  /* ───────────────────────────────────────────────────────────────
     PANELS  (shared base + help / log variants)
     ─────────────────────────────────────────────────────────────── */
  .panel {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 11;
    background: var(--bg);
    color: var(--fg);
    border-top: 1.5px solid var(--fg);
    padding: 1.75rem 2rem 2.5rem;
    transform: translateY(100%);
    transition:
      transform 350ms cubic-bezier(.2, .8, .2, 1),
      background-color var(--theme-transition),
      color var(--theme-transition),
      border-color var(--theme-transition);
    max-height: 75vh;
    overflow-y: auto;
    /* Constrain width on large screens */
    max-width: 640px;
    margin: 0 auto;
  }

  .panel.is-open {
    transform: translateY(0);
  }

  .panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.75rem;
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    opacity: 0.65;
  }

  .panel-close {
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-size: 1.1rem;
    color: var(--fg);
    line-height: 1;
    padding: 0.1rem 0.25rem;
    opacity: 0.7;
    transition: opacity 150ms ease;
  }

  .panel-close:hover {
    opacity: 1;
  }

  /* Help steps list */
  .help-steps {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 1.1rem;
    margin-bottom: 2rem;
  }

  .help-step {
    display: flex;
    gap: 1rem;
    align-items: flex-start;
    font-size: clamp(0.9rem, 1.8vw, 1.05rem);
    line-height: 1.55;
  }

  .help-step-num {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    opacity: 0.45;
    min-width: 2ch;
    padding-top: 0.25em;
    flex-shrink: 0;
  }

  /* Completion log entries */
  .log-entries {
    display: flex;
    flex-direction: column;
    gap: 0.9rem;
    margin-bottom: 2rem;
  }

  .log-entry {
    display: flex;
    gap: 0.85rem;
    align-items: flex-start;
  }

  .log-entry-check {
    color: var(--accent);
    font-size: 0.8rem;
    flex-shrink: 0;
    padding-top: 0.15em;
    transition: color var(--theme-transition);
  }

  .log-entry-body {
    display: flex;
    flex-direction: column;
    gap: 0.2rem;
  }

  .log-entry-text {
    font-size: clamp(0.8rem, 1.6vw, 0.95rem);
    line-height: 1.45;
    opacity: 0.9;
  }

  .log-entry-time {
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0.4;
  }

  .log-empty {
    font-size: 0.85rem;
    opacity: 0.45;
    text-align: center;
    padding: 1.25rem 0;
    letter-spacing: 0.05em;
  }

  /* Panel primary action button */
  .panel-btn {
    font-family: inherit;
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    background: var(--fg);
    color: var(--bg);
    border: none;
    border-radius: 999px;
    padding: 0.85rem 2rem;
    cursor: pointer;
    display: block;
    margin: 0 auto;
    transition:
      transform 200ms ease,
      background-color var(--theme-transition),
      color var(--theme-transition);
  }

  .panel-btn:hover {
    transform: translateY(-1px) scale(1.02);
  }

  .panel-btn:active {
    transform: scale(0.98);
  }

  /* ───────────────────────────────────────────────────────────────
     DECORATIVE  (grain overlay, accent dot, corner brackets)
     ─────────────────────────────────────────────────────────────── */
  body::before {
    /* SVG noise grain overlay for subtle paper texture */
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    opacity: 0.06;
    mix-blend-mode: multiply;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  }

  .accent-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background-color: var(--accent);
    margin-right: 0.5rem;
    vertical-align: middle;
    animation: pulse 1.6s ease-in-out infinite;
  }

  .corner {
    position: fixed;
    width: 24px;
    height: 24px;
    border: 1.5px solid var(--fg);
    opacity: 0.5;
    z-index: 1;
    transition: border-color var(--theme-transition);
  }

  .corner-tl { top: 1rem;    left: 1rem;  border-right: none; border-bottom: none; }
  .corner-tr { top: 1rem;    right: 1rem; border-left: none;  border-bottom: none; }
  .corner-bl { bottom: 1rem; left: 1rem;  border-right: none; border-top: none;    }
  .corner-br { bottom: 1rem; right: 1rem; border-left: none;  border-top: none;    }

  /* ───────────────────────────────────────────────────────────────
     ANIMATIONS
     ─────────────────────────────────────────────────────────────── */
  @keyframes pulse {
    0%, 100% { opacity: 1;   transform: scale(1);   }
    50%      { opacity: 0.4; transform: scale(0.7); }
  }

  @keyframes activity-enter {
    0% {
      opacity: 0;
      transform: translateY(20px) rotate(-1.5deg);
      filter: blur(8px);
    }
    60% {
      opacity: 1;
      filter: blur(0);
    }
    100% {
      transform: translateY(0) rotate(0);
    }
  }

  .activity.is-entering {
    animation: activity-enter var(--reveal-duration) var(--reveal-easing);
  }

  /* ───────────────────────────────────────────────────────────────
     RESPONSIVE
     ─────────────────────────────────────────────────────────────── */
  /* ───────────────────────────────────────────────────────────────
     CATEGORY FILTER  (top-left dropdown)
     ─────────────────────────────────────────────────────────────── */
  .category-filter {
    position: relative;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .category-btn {
    font-family: inherit;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--fg);
    padding: 0;
    display: flex;
    align-items: center;
    gap: 0.45em;
    transition: opacity 150ms ease, color var(--theme-transition);
  }

  .category-btn:hover { opacity: 1; }

  .category-caret {
    font-size: 0.55rem;
    opacity: 0.6;
    display: inline-block;
    transition: transform 200ms ease;
  }

  .category-filter.is-open .category-caret {
    transform: rotate(180deg);
  }

  .category-menu {
    position: absolute;
    top: calc(100% + 0.6rem);
    left: -0.75rem;
    background: var(--bg);
    border: 1.5px solid var(--fg);
    list-style: none;
    min-width: 150px;
    z-index: 20;
    padding: 0.35rem 0;
    transition:
      background-color var(--theme-transition),
      border-color var(--theme-transition);
  }

  .category-menu[hidden] { display: none; }

  .cat-item {
    font-family: inherit;
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--fg);
    opacity: 0.6;
    padding: 0.55rem 1rem;
    width: 100%;
    text-align: left;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.75rem;
    transition:
      opacity 100ms ease,
      background-color 100ms ease,
      color 100ms ease,
      color var(--theme-transition);
  }

  .cat-item:hover {
    opacity: 1;
    background: var(--fg);
    color: var(--bg);
  }

  .cat-item.is-active {
    opacity: 1;
  }

  .cat-count {
    font-size: 0.6rem;
    opacity: 0.5;
    letter-spacing: 0.05em;
  }

  .cat-item:hover .cat-count { opacity: 0.7; }

  /* ───────────────────────────────────────────────────────────────
     RESPONSIVE
     ─────────────────────────────────────────────────────────────── */
  @media (max-width: 600px) {
    body { padding: 1.5rem 1rem; }
    .corner { width: 16px; height: 16px; }
    .panel { padding: 1.5rem 1.25rem 2.25rem; }
    .secondary-actions { gap: 1rem; }
  }
  </style>
</head>
<body>
  <!-- Decorative corner brackets -->
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <header class="page-header">
    <div class="category-filter" id="category-filter">
      <span class="accent-dot"></span>
      <button class="category-btn" id="category-btn" type="button">
        <span id="category-label">All</span>
        <span class="category-caret">▾</span>
      </button>
      <ul class="category-menu" id="category-menu" hidden>
        <li><button class="cat-item is-active" data-cat="all" type="button">All <span class="cat-count" id="count-all"></span></button></li>
        <li><button class="cat-item" data-cat="no-wifi" type="button">No WiFi <span class="cat-count" id="count-no-wifi"></span></button></li>
        <li><button class="cat-item" data-cat="exercise" type="button">Exercise <span class="cat-count" id="count-exercise"></span></button></li>
        <li><button class="cat-item" data-cat="learning" type="button">Learning <span class="cat-count" id="count-learning"></span></button></li>
        <li><button class="cat-item" data-cat="creativity" type="button">Creativity <span class="cat-count" id="count-creativity"></span></button></li>
        <li><button class="cat-item" data-cat="random" type="button">Very Random <span class="cat-count" id="count-random"></span></button></li>
      </ul>
    </div>
    <span>Vol. 01</span>
  </header>

  <main class="page-main">
    <div class="activity-counter" id="activity-counter">No. 01</div>

    <div class="activity" id="activity">
      <p class="activity-text" id="activity-text">Press the button.</p>
      <p class="activity-subtitle" id="activity-subtitle" hidden></p>
    </div>

    <div class="controls">
      <button class="next-button" id="next-button" type="button">
        Give me something
      </button>
      <p class="next-button-hint">or press the spacebar</p>

      <div class="secondary-actions">
        <button class="done-button" id="done-button" type="button">Done it</button>
        <button class="help-link" id="help-link" type="button" hidden>How to start →</button>
      </div>
    </div>
  </main>

  <footer class="page-footer">
    <span>Cure for the idle hour</span>
    <button class="done-count" id="done-count" type="button">↓ One click away</button>
  </footer>

  <!-- Panel backdrop -->
  <div class="panel-backdrop" id="panel-backdrop"></div>

  <!-- Help panel: how to start -->
  <div class="panel" id="help-panel" role="dialog" aria-modal="true" aria-label="How to start">
    <div class="panel-header">
      <span>How to start</span>
      <button class="panel-close" type="button" aria-label="Close panel">×</button>
    </div>
    <ol class="help-steps" id="help-steps"></ol>
    <button class="panel-btn" id="help-got-it" type="button">Got it →</button>
  </div>

  <!-- Log panel: completion history -->
  <div class="panel" id="log-panel" role="dialog" aria-modal="true" aria-label="Done list">
    <div class="panel-header">
      <span>Done list</span>
      <button class="panel-close" type="button" aria-label="Close panel">×</button>
    </div>
    <div class="log-entries" id="log-entries"></div>
    <button class="panel-btn" id="log-close" type="button">Keep going →</button>
  </div>

  <script>
  'use strict';

  // ══════════════════════════════════════════════════════════════
  // DATA
  // ══════════════════════════════════════════════════════════════
  const activities = JSON.parse(
    document.getElementById('activity-data').textContent
  );

  // ══════════════════════════════════════════════════════════════
  // DOM REFERENCES
  // ══════════════════════════════════════════════════════════════
  const el = {
    root:            document.documentElement,
    counter:         document.getElementById('activity-counter'),
    activity:        document.getElementById('activity'),
    text:            document.getElementById('activity-text'),
    subtitle:        document.getElementById('activity-subtitle'),
    button:          document.getElementById('next-button'),
    doneButton:      document.getElementById('done-button'),
    helpLink:        document.getElementById('help-link'),
    doneCount:       document.getElementById('done-count'),
    backdrop:        document.getElementById('panel-backdrop'),
    helpPanel:       document.getElementById('help-panel'),
    helpSteps:       document.getElementById('help-steps'),
    logPanel:        document.getElementById('log-panel'),
    logEntries:      document.getElementById('log-entries'),
    categoryFilter:  document.getElementById('category-filter'),
    categoryBtn:     document.getElementById('category-btn'),
    categoryLabel:   document.getElementById('category-label'),
    categoryMenu:    document.getElementById('category-menu'),
  };

  // ══════════════════════════════════════════════════════════════
  // STATE
  // ══════════════════════════════════════════════════════════════
  let previousIndex     = -1;
  let currentIndex      = -1;
  const recentlyShown   = new Set();
  const STORAGE_KEY     = 'now-what-completions';
  let currentCategory   = 'all';

  const CATEGORY_LABELS = {
    all:        'All',
    'no-wifi':  'No WiFi',
    exercise:   'Exercise',
    learning:   'Learning',
    creativity: 'Creativity',
    random:     'Very Random',
  };

  // ══════════════════════════════════════════════════════════════
  // CATEGORY FILTER
  // ══════════════════════════════════════════════════════════════
  function getPool() {
    if (currentCategory === 'all') return activities.map((_, i) => i);
    return activities.reduce((acc, a, i) => {
      if (a.category === currentCategory) acc.push(i);
      return acc;
    }, []);
  }

  function populateCounts() {
    const cats = ['all', 'no-wifi', 'exercise', 'learning', 'creativity', 'random'];
    cats.forEach(cat => {
      const el2 = document.getElementById(`count-${cat}`);
      if (!el2) return;
      const n = cat === 'all' ? activities.length : activities.filter(a => a.category === cat).length;
      el2.textContent = n;
    });
  }

  // ══════════════════════════════════════════════════════════════
  // SELECTION
  // ══════════════════════════════════════════════════════════════
  function pickNextIndex() {
    const pool = getPool();
    if (pool.length === 0) return previousIndex >= 0 ? previousIndex : 0;

    // Reset cycle once every pool item has been shown
    const shownInPool = pool.filter(i => recentlyShown.has(i)).length;
    if (shownInPool >= pool.length) {
      pool.forEach(i => recentlyShown.delete(i));
    }

    const candidates = pool.filter(i => i !== previousIndex && !recentlyShown.has(i));
    const source = candidates.length > 0 ? candidates : pool.filter(i => i !== previousIndex);
    const finalSource = source.length > 0 ? source : pool;

    const index = finalSource[Math.floor(Math.random() * finalSource.length)];
    recentlyShown.add(index);
    previousIndex = index;
    return index;
  }

  // ══════════════════════════════════════════════════════════════
  // RENDERING
  // ══════════════════════════════════════════════════════════════
  function applyTheme(activity) {
    el.root.style.setProperty('--bg',     activity.bg);
    el.root.style.setProperty('--fg',     activity.fg);
    el.root.style.setProperty('--accent', activity.accent);
  }

  function applyTypography(activity) {
    el.root.style.setProperty('--activity-font',     activity.fontFamily);
    el.root.style.setProperty('--activity-size',     activity.fontSize);
    el.root.style.setProperty('--activity-weight',   activity.fontWeight);
    el.root.style.setProperty('--activity-tracking', activity.letterSpacing);
  }

  function applyContent(activity) {
    el.text.textContent = activity.text;
    if (activity.subtitle) {
      el.subtitle.textContent = activity.subtitle;
      el.subtitle.hidden = false;
    } else {
      el.subtitle.hidden = true;
    }
  }

  function updateCounter(index) {
    const pool    = getPool();
    const pos     = pool.indexOf(index);
    const current = String(pos >= 0 ? pos + 1 : 1).padStart(2, '0');
    const total   = String(pool.length).padStart(2, '0');
    el.counter.textContent = `No. ${current} / ${total}`;
  }

  function restartEnterAnimation() {
    el.activity.classList.remove('is-entering');
    void el.activity.offsetWidth;
    el.activity.classList.add('is-entering');
  }

  function displayActivity(index) {
    currentIndex = index;
    const activity = activities[index];
    applyTheme(activity);
    applyTypography(activity);
    applyContent(activity);
    updateCounter(index);
    restartEnterAnimation();

    // Show/hide "How to start" based on whether this activity has help steps
    el.helpLink.hidden = !activity.help;

    // Reset done button for the new activity
    el.doneButton.textContent = 'Done it';
    el.doneButton.classList.remove('is-confirmed');
    el.doneButton.disabled = false;
  }

  function showNextActivity() {
    displayActivity(pickNextIndex());
  }

  // ══════════════════════════════════════════════════════════════
  // COMPLETION LOG
  // ══════════════════════════════════════════════════════════════
  function getCompletions() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    } catch {
      return [];
    }
  }

  function saveCompletion(index) {
    const activity    = activities[index];
    const completions = getCompletions();
    completions.unshift({ text: activity.text, ts: Date.now() });
    if (completions.length > 50) completions.length = 50;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(completions));
  }

  function timeAgo(ts) {
    const s = Math.floor((Date.now() - ts) / 1000);
    if (s < 60)                          return 'just now';
    if (s < 3600)                        return `${Math.floor(s / 60)}m ago`;
    if (s < 86400)                       return `${Math.floor(s / 3600)}h ago`;
    if (Math.floor(s / 86400) === 1)     return 'yesterday';
    return `${Math.floor(s / 86400)} days ago`;
  }

  function updateDoneCount() {
    const count = getCompletions().length;
    if (count === 0) {
      el.doneCount.textContent = '↓ One click away';
      el.doneCount.classList.remove('has-items');
    } else {
      el.doneCount.textContent = `${count} done`;
      el.doneCount.classList.add('has-items');
    }
  }

  // ══════════════════════════════════════════════════════════════
  // PANELS
  // ══════════════════════════════════════════════════════════════
  function openPanel(panel) {
    el.backdrop.classList.add('is-open');
    panel.classList.add('is-open');
  }

  function closeAllPanels() {
    el.backdrop.classList.remove('is-open');
    el.helpPanel.classList.remove('is-open');
    el.logPanel.classList.remove('is-open');
  }

  function showHelpPanel() {
    if (currentIndex < 0) return;
    const activity = activities[currentIndex];
    if (!activity.help) return;

    el.helpSteps.innerHTML = activity.help.map((step, i) => `
      <li class="help-step">
        <span class="help-step-num">0${i + 1}</span>
        <span>${step}</span>
      </li>`).join('');

    openPanel(el.helpPanel);
  }

  function showLogPanel() {
    const completions = getCompletions();

    if (completions.length === 0) {
      el.logEntries.innerHTML = `<p class="log-empty">Nothing yet — go do something.</p>`;
    } else {
      el.logEntries.innerHTML = completions.map(c => {
        const truncated = c.text.length > 70 ? c.text.slice(0, 70) + '…' : c.text;
        return `
          <div class="log-entry">
            <span class="log-entry-check">✓</span>
            <div class="log-entry-body">
              <span class="log-entry-text">${truncated}</span>
              <span class="log-entry-time">${timeAgo(c.ts)}</span>
            </div>
          </div>`;
      }).join('');
    }

    openPanel(el.logPanel);
  }

  // ══════════════════════════════════════════════════════════════
  // DONE BUTTON
  // ══════════════════════════════════════════════════════════════
  function handleDone() {
    if (currentIndex < 0 || el.doneButton.disabled) return;

    saveCompletion(currentIndex);
    updateDoneCount();

    el.doneButton.textContent = 'Done ✓';
    el.doneButton.classList.add('is-confirmed');
    el.doneButton.disabled = true;
  }

  // ══════════════════════════════════════════════════════════════
  // EVENTS
  // ══════════════════════════════════════════════════════════════
  el.button.addEventListener('click', showNextActivity);
  el.doneButton.addEventListener('click', handleDone);
  el.helpLink.addEventListener('click', showHelpPanel);

  el.doneCount.addEventListener('click', () => {
    if (getCompletions().length > 0) showLogPanel();
  });

  el.backdrop.addEventListener('click', closeAllPanels);

  document.querySelectorAll('.panel-close').forEach(btn =>
    btn.addEventListener('click', closeAllPanels)
  );
  document.getElementById('help-got-it').addEventListener('click', closeAllPanels);
  document.getElementById('log-close').addEventListener('click', closeAllPanels);

  // ── Category dropdown ──
  function closeCategoryMenu() {
    el.categoryMenu.hidden = true;
    el.categoryFilter.classList.remove('is-open');
  }

  el.categoryBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    const opening = el.categoryMenu.hidden;
    el.categoryMenu.hidden = !opening;
    el.categoryFilter.classList.toggle('is-open', opening);
  });

  document.querySelectorAll('.cat-item').forEach(btn => {
    btn.addEventListener('click', () => {
      const cat = btn.dataset.cat;
      currentCategory = cat;
      recentlyShown.clear();
      previousIndex = -1;

      // Update label
      el.categoryLabel.textContent = CATEGORY_LABELS[cat];

      // Update active state
      document.querySelectorAll('.cat-item').forEach(b => b.classList.remove('is-active'));
      btn.classList.add('is-active');

      closeCategoryMenu();
      showNextActivity();
    });
  });

  // Close dropdown when clicking outside
  document.addEventListener('click', (e) => {
    if (!el.categoryFilter.contains(e.target)) closeCategoryMenu();
  });

  document.addEventListener('keydown', (event) => {
    if (event.code === 'Escape') {
      closeCategoryMenu();
      closeAllPanels();
      return;
    }
    const panelOpen = el.helpPanel.classList.contains('is-open') ||
                      el.logPanel.classList.contains('is-open');
    const menuOpen  = !el.categoryMenu.hidden;
    if (!panelOpen && !menuOpen && (event.code === 'Space' || event.code === 'Enter')) {
      event.preventDefault();
      showNextActivity();
    }
  });
